<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Twin Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { background-color: #f8f9fa; margin: 0; padding: 0; }
    .chat-container { width: 100%; height: 100vh; display: flex; flex-direction: column; }
    .chat-box {
      flex-grow: 1; overflow-y: auto; padding: 20px; background: white;
    }
    .message { margin-bottom: 15px; display: flex; }
    .user { justify-content: flex-end; }
    .assistant { justify-content: flex-start; }
    .bubble {
      padding: 10px 15px; border-radius: 15px; max-width: 75%;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user {
      background-color: #007bff; color: white;
      border-bottom-right-radius: 0;
    }
    .bubble.assistant {
      background-color: #e9ecef;
      border-bottom-left-radius: 0;
    }
    .input-area {
      display: flex; padding: 10px; background: #f1f1f1; border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="d-flex justify-content-between align-items-center p-2 bg-light border-bottom">
      <h5 class="m-0">Digital Twin Chat</h5>
      <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#configModal">⚙️ Config</button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
      <input id="query" class="form-control me-2" placeholder="Enter your query...">
      <button id="sendBtn" class="btn btn-primary me-2">Send</button>
      <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
    </div>
  </div>

  <!-- Config Modal -->
  <div class="modal fade" id="configModal" tabindex="-1" aria-labelledby="configLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="configLabel">Configuration</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Ollama Host</label>
            <input type="text" id="ollamaHost" class="form-control" placeholder="http://localhost:11434">
          </div>
          <div class="mb-3">
            <label class="form-label">Model Name</label>
            <input type="text" id="ollamaModel" class="form-control" placeholder="gpt-oss:120b">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="saveConfigBtn" data-bs-dismiss="modal">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");
    let controller = null;
    let sessionId = Math.random().toString(36).slice(2, 10);

    // Config persistence
    const ollamaHostInput = document.getElementById("ollamaHost");
    const ollamaModelInput = document.getElementById("ollamaModel");

    function loadConfig() {
      ollamaHostInput.value = localStorage.getItem("ollamaHost") || "http://10.1.1.1:60002";
      ollamaModelInput.value = localStorage.getItem("ollamaModel") || "gpt-oss:120b";
    }
    function saveConfig() {
      localStorage.setItem("ollamaHost", ollamaHostInput.value);
      localStorage.setItem("ollamaModel", ollamaModelInput.value);
    }

    document.getElementById("saveConfigBtn").addEventListener("click", saveConfig);
    loadConfig();

    function appendMessage(sender, text) {
      const div = document.createElement("div");
      div.classList.add("message", sender);
      const bubble = document.createElement("div");
      bubble.classList.add("bubble", sender);
      bubble.innerText = text;
      div.appendChild(bubble);
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return bubble;
    }

    async function sendQuery() {
      const query = document.getElementById("query").value.trim();
      if (!query) return;
      appendMessage("user", query);
      document.getElementById("query").value = "";
      const bubble = appendMessage("assistant", "Thinking...");
      sendBtn.disabled = true;
      stopBtn.disabled = false;

      controller = new AbortController();
      const host = ollamaHostInput.value;
      const model = ollamaModelInput.value;

      const response = await fetch("/stream", {
        method: "POST",
        body: new URLSearchParams({ query, id: sessionId, host, model }),
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        signal: controller.signal
      });

      bubble.innerText = "";
      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split("\n\n").filter(l => l.startsWith("data: "));
        for (let line of lines) {
          bubble.innerText += line.replace("data: ", "");
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }
      sendBtn.disabled = false;
      stopBtn.disabled = true;
    }

    async function stopStream() {
      if (!controller) return;
      controller.abort();
      await fetch("/stop", {
        method: "POST",
        body: new URLSearchParams({ id: sessionId }),
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      });
      appendMessage("assistant", "[⛔ Process stopped]");
      sendBtn.disabled = false;
      stopBtn.disabled = true;
    }

    sendBtn.addEventListener("click", sendQuery);
    stopBtn.addEventListener("click", stopStream);
    document.getElementById("query").addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendQuery();
      }
    });
  </script>
</body>
</html>
